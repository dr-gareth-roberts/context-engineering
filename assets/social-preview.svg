<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.025" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Logo icon (scaled up) -->
  <g transform="translate(100, 170) scale(2.3)">
    <rect x="0" y="0" width="88" height="96" rx="6" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.8"/>
    <rect x="8" y="8" width="72" height="16" rx="3" fill="#3b82f6" opacity="0.9"/>
    <rect x="8" y="28" width="72" height="12" rx="3" fill="#8b5cf6" opacity="0.7"/>
    <rect x="8" y="44" width="42" height="12" rx="3" fill="#6366f1" opacity="0.6"/>
    <rect x="54" y="44" width="26" height="12" rx="3" fill="#a78bfa" opacity="0.45"/>
    <rect x="8" y="60" width="34" height="12" rx="3" fill="#818cf8" opacity="0.5"/>
    <rect x="46" y="60" width="34" height="12" rx="3" fill="#c4b5fd" opacity="0.3"/>
    <line x1="0" y1="80" x2="88" y2="80" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="420" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="72" fill="white" font-weight="800" letter-spacing="-2">
    Context Engineering
  </text>
  <text x="420" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="72" fill="url(#accent)" font-weight="800" letter-spacing="-2">
    Toolkit
  </text>

  <!-- Tagline -->
  <text x="420" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">
    Pack, debug, red-team, and orchestrate LLM context windows
  </text>

  <!-- Stats -->
  <g transform="translate(420, 450)">
    <rect width="150" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="75" y="26" font-family="monospace" font-size="16" fill="#3b82f6" text-anchor="middle" font-weight="bold">17 packages</text>

    <rect x="165" width="150" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="240" y="26" font-family="monospace" font-size="16" fill="#10b981" text-anchor="middle" font-weight="bold">2,172 tests</text>

    <rect x="330" width="170" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="415" y="26" font-family="monospace" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">TypeScript + Python</text>
  </g>

  <!-- Feature keywords -->
  <text x="420" y="540" font-family="monospace" font-size="14" fill="#475569" letter-spacing="1.5">
    pack | council | adversarial | compiler | drift | immune | entangle | time-travel
  </text>
</svg>
