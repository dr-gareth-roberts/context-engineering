<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#0a0a0a"/>

  <!-- Context window frame -->
  <rect x="20" y="16" width="88" height="96" rx="6" stroke="url(#frame)" stroke-width="2.5" fill="none"/>

  <!-- Packed items (stacked blocks inside the frame) -->
  <rect x="28" y="24" width="72" height="16" rx="3" fill="#3b82f6" opacity="0.9"/>
  <rect x="28" y="44" width="72" height="12" rx="3" fill="#8b5cf6" opacity="0.7"/>
  <rect x="28" y="60" width="42" height="12" rx="3" fill="#6366f1" opacity="0.6"/>
  <rect x="74" y="60" width="26" height="12" rx="3" fill="#a78bfa" opacity="0.45"/>
  <rect x="28" y="76" width="34" height="12" rx="3" fill="#818cf8" opacity="0.5"/>
  <rect x="66" y="76" width="34" height="12" rx="3" fill="#c4b5fd" opacity="0.3"/>

  <!-- Budget line -->
  <line x1="20" y1="95" x2="108" y2="95" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
</svg>
