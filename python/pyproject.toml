[project]
name = "context-engineering"
version = "0.1.0"
description = "Context engineering toolkit"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "pydantic>=2.7.0",
  "httpx>=0.27.0",
  "tiktoken>=0.7.0",
  "jsonschema>=4.21.0"
]

[project.scripts]
ce = "context_engineering.cli:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["context_engineering*", "context_framework*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
